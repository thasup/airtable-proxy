services:
  - type: web
    name: airtable-proxy
    env: python
    region: oregon 
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_PATH
        value: /tmp/proxy.db
      - key: AIRTABLE_PAT
        sync: false
      - key: ADMIN_SECRET
        sync: false
